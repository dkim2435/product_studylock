[phases.setup]
nixPkgs = ["python311Full", "python311Packages.pip", "python311Packages.setuptools"]

[phases.install]
cmds = ["cd backend && python3.11 -m ensurepip --upgrade && python3.11 -m pip install -r requirements.txt"]

[start]
cmd = "cd backend && python3.11 -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
